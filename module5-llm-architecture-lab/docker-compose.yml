name: module5-llm-architecture-lab

services:
  portal:
    build:
      context: .
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_TIMEOUT: ${OLLAMA_TIMEOUT:-300}
    depends_on:
      ollama:
        condition: service_started
    ports:
      - 127.0.0.1:8501:8501
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - 127.0.0.1:${OLLAMA_PORT:-11435}:11434
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-data:
