name: Encoded PowerShell from an unusual parent
scenario_id: DE-LAB-PS-001
objective: Detect encoded PowerShell that contains an Invoke keyword and is not launched by approved management tooling.
narrative: |
  A finance workstation opened a macro-enabled document. Microsoft Word then
  launched Windows PowerShell with a hidden window and an encoded command. The
  decoded command used Invoke-WebRequest and Invoke-Expression to retrieve and
  execute a second stage. Configuration Manager also uses encoded PowerShell in
  this environment, so encoded execution alone is not sufficient.
known_evidence:
  host: WS-FIN-023
  user: NEXUS\\j.singh
  data_source: Sysmon process creation
  malicious_parent: C:\\Program Files\\Microsoft Office\\root\\Office16\\WINWORD.EXE
  approved_parent: C:\\Program Files\\Microsoft Configuration Manager\\CcmExec.exe
constraints:
  - Use portable Sigma Windows process_creation fields.
  - Do not depend on a single full command line.
  - Include at least two PowerShell image variants.
  - Treat approved management tooling as a candidate exclusion that must be tested.
  - Use only ATT&CK IDs present in the supplied catalog.

