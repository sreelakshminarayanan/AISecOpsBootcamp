name: WMIC security product tampering
scenario_id: DE-LAB-WMIC-001
objective: Detect WMIC attempts to stop, terminate, or uninstall security tooling.
narrative: |
  A threat actor used wmic.exe on a Windows endpoint to query and terminate a
  security product. Software packaging administrators also use WMIC for general
  inventory and application maintenance. The detection must focus on tampering
  verbs and security product context rather than every WMIC execution.
known_evidence:
  data_source: Sysmon process creation
  image: C:\\Windows\\System32\\wbem\\WMIC.exe
  suspicious_terms:
    - call terminate
    - uninstall
    - AntiVirusProduct
constraints:
  - Do not alert on ordinary computersystem or product inventory queries.
  - Use portable Sigma fields.
  - Separate core behavior from environment-specific product names.

