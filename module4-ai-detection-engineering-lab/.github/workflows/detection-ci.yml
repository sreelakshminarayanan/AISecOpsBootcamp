name: Detection CI

on:
  push:
    paths:
      - "rules/**"
      - "tests/**"
      - "schemas/**"
      - "detection_lab/**"
      - "portal/**"
      - "docker-compose.yml"
      - "requirements.txt"
  pull_request:
    paths:
      - "rules/**"
      - "tests/**"
      - "schemas/**"
      - "detection_lab/**"
      - "portal/**"
      - "docker-compose.yml"
      - "requirements.txt"

jobs:
  static-gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m detection_lab.cli audit --root .
      - run: python -m detection_lab.cli validate --rule rules/validated/encoded_powershell.yml --fixtures tests/fixtures/encoded_powershell
      - run: python -m detection_lab.cli convert --rule rules/validated/encoded_powershell.yml --output reports/ci-query.txt
      - run: pytest -q
