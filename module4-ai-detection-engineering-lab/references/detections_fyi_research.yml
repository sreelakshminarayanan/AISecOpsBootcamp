source: https://detection.fyi/
purpose: Community detection research and comparison
rules:
  - title: PowerShell Base64 Encoded Invoke Keyword
    language: Sigma
    source_url: https://detection.fyi/sigmahq/sigma/windows/process_creation/proc_creation_win_powershell_base64_invoke/
    original_repository: https://github.com/SigmaHQ/sigma/blob/master/rules/windows/process_creation/proc_creation_win_powershell_base64_invoke.yml
    research_focus:
      - Image and OriginalFileName coverage
      - Encoded UTF-8 and UTF-16 Invoke fragments
      - Condition structure
      - Simulation and regression metadata
  - title: Base64 Encoded PowerShell Command Detected
    language: Sigma
    source_url: https://detection.fyi/sigmahq/sigma/windows/process_creation/proc_creation_win_powershell_frombase64string/
    research_focus:
      - Alternative encoding indicators
      - Breadth versus false-positive cost
      - Related rule coverage
  - title: Invoke-Obfuscation CLIP+ Launcher
    language: Sigma
    source_url: https://detection.fyi/sigmahq/sigma/windows/process_creation/proc_creation_win_hktl_invoke_obfuscation_clip/
    research_focus:
      - Obfuscation-specific behavior
      - Command-line fragments
      - Rule scope and blind spots
research_questions:
  - What stable attacker behavior is common across the rules?
  - Which fields are portable and which are environment-specific?
  - Which values are likely to be brittle?
  - What benign operations could match?
  - What positive and negative regression tests are required?
  - Which rule status, references, and test metadata affect confidence?

