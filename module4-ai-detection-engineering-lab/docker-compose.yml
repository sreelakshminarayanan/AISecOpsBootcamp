services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION:-9.4.3}
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      xpack.security.http.ssl.enabled: "false"
      xpack.security.transport.ssl.enabled: "false"
      xpack.license.self_generated.type: basic
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-DetectionLab2026}
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - elastic-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS -u elastic:${ELASTIC_PASSWORD:-DetectionLab2026} http://localhost:9200/_cluster/health?wait_for_status=yellow || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks: [detection-lab]

  elastic-setup:
    image: docker.elastic.co/elasticsearch/elasticsearch:${ELASTIC_VERSION:-9.4.3}
    environment:
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-DetectionLab2026}
      KIBANA_PASSWORD: ${KIBANA_PASSWORD:-KibanaLab2026}
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        until curl -fsS -u "elastic:$$ELASTIC_PASSWORD" http://elasticsearch:9200/_cluster/health >/dev/null; do sleep 2; done
        curl -fsS -u "elastic:$$ELASTIC_PASSWORD" -H "Content-Type: application/json" -X POST http://elasticsearch:9200/_security/user/kibana_system/_password -d "{\"password\":\"$$KIBANA_PASSWORD\"}"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks: [detection-lab]

  kibana:
    image: docker.elastic.co/kibana/kibana:${ELASTIC_VERSION:-9.4.3}
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
      ELASTICSEARCH_USERNAME: kibana_system
      ELASTICSEARCH_PASSWORD: ${KIBANA_PASSWORD:-KibanaLab2026}
      XPACK_SECURITY_ENABLED: "true"
      XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY: detection-lab-encryption-key-32chars
      XPACK_REPORTING_ENCRYPTIONKEY: detection-lab-reporting-key-32chars
      XPACK_SECURITY_ENCRYPTIONKEY: detection-lab-security-key-32-chars
      SERVER_PUBLICBASEURL: http://localhost:5601
    ports:
      - "127.0.0.1:5601:5601"
    depends_on:
      elastic-setup:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 40
    networks: [detection-lab]

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks: [detection-lab]

  ollama-init:
    image: ollama/ollama:latest
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:3b}
    entrypoint: ["/bin/sh", "-c"]
    command: ["until ollama list >/dev/null 2>&1; do echo 'Waiting for Ollama API'; sleep 3; done; if ollama list | awk 'NR > 1 {print $$1}' | grep -Fx \"$$OLLAMA_MODEL\" >/dev/null; then echo \"Model $$OLLAMA_MODEL is ready\"; else echo \"Downloading $$OLLAMA_MODEL. The rest of the lab can start while this completes.\"; ollama pull \"$$OLLAMA_MODEL\"; fi"]
    depends_on:
      ollama:
        condition: service_started
    restart: "on-failure:5"
    networks: [detection-lab]

  telemetry-init:
    build: .
    working_dir: /workspace
    entrypoint: ["python", "/workspace/scripts/bootstrap.py"]
    environment:
      PYTHONPATH: /workspace
      LAB_ROOT: /workspace
      ELASTIC_URL: http://elasticsearch:9200
      KIBANA_URL: http://kibana:5601
      LAB_INDEX: ${LAB_INDEX:-lab-security-events-v1}
      ELASTIC_USERNAME: ${ELASTIC_USERNAME:-elastic}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-DetectionLab2026}
    volumes:
      - .:/workspace
    depends_on:
      elasticsearch:
        condition: service_healthy
      kibana:
        condition: service_healthy
    networks: [detection-lab]

  pipeline:
    build: .
    working_dir: /workspace
    entrypoint: ["/bin/sh", "-c"]
    command: ["sleep infinity"]
    environment:
      PYTHONPATH: /workspace
      LAB_ROOT: /workspace
      ELASTIC_URL: http://elasticsearch:9200
      KIBANA_URL: http://kibana:5601
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:3b}
      LAB_INDEX: ${LAB_INDEX:-lab-security-events-v1}
      ELASTIC_USERNAME: ${ELASTIC_USERNAME:-elastic}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-DetectionLab2026}
    volumes:
      - .:/workspace
    depends_on:
      telemetry-init:
        condition: service_completed_successfully
      ollama:
        condition: service_started
    networks: [detection-lab]

  portal:
    build: .
    working_dir: /workspace
    entrypoint: ["python", "-m", "streamlit"]
    command: ["run", "/workspace/portal/app.py", "--server.address=0.0.0.0", "--server.port=8501", "--server.headless=true", "--browser.gatherUsageStats=false"]
    environment:
      PYTHONPATH: /workspace
      LAB_ROOT: /workspace
      ELASTIC_URL: http://elasticsearch:9200
      KIBANA_URL: http://kibana:5601
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5-coder:3b}
      LAB_INDEX: ${LAB_INDEX:-lab-security-events-v1}
      ELASTIC_USERNAME: ${ELASTIC_USERNAME:-elastic}
      ELASTIC_PASSWORD: ${ELASTIC_PASSWORD:-DetectionLab2026}
    ports:
      - "127.0.0.1:${PORTAL_PORT:-8501}:8501"
    volumes:
      - .:/workspace
    depends_on:
      pipeline:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8501/_stcore/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks: [detection-lab]

volumes:
  elastic-data:
  ollama-data:

networks:
  detection-lab:
    driver: bridge
