title: Encoded PowerShell Invoke Content Outside Approved Management Tools
id: 3ba9a8fd-8485-4f99-bda8-5f70c302286f
status: test
description: Detects Windows PowerShell or PowerShell Core using an encoded command that contains common Base64 fragments for the Invoke keyword, excluding approved management parents.
references:
  - https://detection.fyi/sigmahq/sigma/windows/process_creation/proc_creation_win_powershell_base64_invoke/
author: AI SecOps Bootcamp
date: 2026-07-10
tags:
  - attack.execution
  - attack.stealth
  - attack.t1059.001
  - attack.t1027
logsource:
  product: windows
  category: process_creation
detection:
  selection_image:
    Image|endswith:
      - '\\powershell.exe'
      - '\\pwsh.exe'
  selection_encoded_flag:
    CommandLine|contains:
      - ' -e '
      - ' -enc '
      - ' -encodedcommand '
  selection_invoke_fragment:
    CommandLine|contains:
      - 'SQBuAHYAbwBrAGUALQ'
      - 'kAbgB2AG8AawBlAC0A'
      - 'JAG4AdgBvAGsAZQAtA'
      - 'SW52b2tlL'
      - 'ludm9rZS'
      - 'JbnZva2Ut'
  filter_approved_management:
    ParentImage|endswith:
      - '\\CcmExec.exe'
      - '\\IntuneManagementExtension.exe'
  condition: all of selection_* and not filter_approved_management
falsepositives:
  - Approved automation that uses encoded Invoke commands outside the listed management agents.
level: high

